{% extends 'base.html' %}

{% block content %}

<div class="card shadow p-4" style="max-width:500px; margin:auto;">
    
    <h4 class="mb-3 text-center">Edit Expense</h4>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label>Amount</label>
            <input type="number" name="amount" class="form-control" value="{{ expense.amount }}" required>
        </div>

        <div class="mb-3">
            <label>Description</label>
            <input type="text" name="description" class="form-control" value="{{ expense.description }}">
        </div>

        <button class="btn btn-success w-100">Update Expense</button>
    </form>

</div>

{% endblock %}
