{% extends 'base.html' %}

{% block content %}

<h3 class="mb-4">Dashboard</h3>

{% if alert %}
<div class="alert alert-danger">
    {{ alert }}
</div>
{% endif %}

<div class="card shadow mb-4">
    <div class="card-body">

        <h5 class="mb-3">All Expenses</h5>

        <form method="GET" class="row mb-3">
            <div class="col">
                <input type="date" name="start" class="form-control">
            </div>
            <div class="col">
                <input type="date" name="end" class="form-control">
            </div>
            <div class="col">
                <button class="btn btn-primary">Filter</button>
            </div>
        </form>
        <table class="table table-hover">
            <thead class="table-dark">
                <tr>
                    <th>Category</th>
                    <th>Amount</th>
                    <th>Date</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
            {% for expense in expenses %}
                <tr>
                    <td>{{ expense.category }}</td>
                    <td>₹{{ expense.amount }}</td>
                    <td>{{ expense.date }}</td>
                    <td>
                        <a href="/edit/{{ expense.id }}" class="btn btn-warning btn-sm">Edit</a>
                        <a href="/delete/{{ expense.id }}" class="btn btn-danger btn-sm"
                           onclick="return confirm('Delete this expense?')">Delete</a>
                    </td>
                </tr>
            {% endfor %}
            </tbody>

        </table>

    </div>
</div>

<div class="card shadow p-3">
    <h5 class="text-center">Expense Chart</h5>

    <div class="d-flex justify-content-center">
        <div style="width: 350px;">
            <canvas id="expenseChart"></canvas>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    const labels = JSON.parse('{{ labels|escapejs }}');
    const data = JSON.parse('{{ values|escapejs }}');

    const ctx = document.getElementById('expenseChart').getContext('2d');

    new Chart(ctx, {
        type: 'pie',
        data: {
            labels: labels,
            datasets: [{
                data: data
            }]
        }
    });

    const months = JSON.parse('{{ months|escapejs }}');
    const totals = JSON.parse('{{ totals|escapejs }}');

    const ctx2 = document.getElementById('barChart').getContext('2d');

    new Chart(ctx2, {
        type: 'bar',
        data: {
            labels: months,
            datasets: [{
                label: 'Monthly Expense',
                data: totals
            }]
        }
    });
</script>

{% endblock %}
